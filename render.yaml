# Render blueprint.
#
# 1) A web service that hosts the dashboard.
# 2) A daily cron job that sends the short Telegram summary + link.
#
# Set the secret values (SUPABASE_SERVICE_ROLE_KEY, TELEGRAM_BOT_TOKEN,
# TELEGRAM_CHAT_ID) in the Render dashboard — they are marked sync:false so
# they are NOT stored in this file. After the web service is live, copy its
# URL into PLATFORM_URL on the cron job.

services:
  - type: web
    name: ob-chat-checklist-dashboard
    runtime: node
    plan: free
    # Автодеплой при пуше в подключённую ветку — чтобы крон не запускал старый
    # билд (иначе новые метрики в сводке молча не появятся).
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: SUPABASE_URL
        value: https://fjsogozwseqoxgddjeig.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Общий пароль доступа к дашборду — задать в Render (sync:false).
      # Если не задан, дашборд открыт без пароля (только для локальной разработки).
      - key: ACCESS_PASSWORD
        sync: false
      - key: NODE_ENV
        value: production

  - type: cron
    name: ob-chat-checklist-daily
    runtime: node
    plan: free
    autoDeploy: true
    # 08:00 Asia/Yerevan is 04:00 UTC. Adjust to taste.
    schedule: "0 4 * * *"
    buildCommand: npm install
    startCommand: npm run daily-report
    envVars:
      - key: SUPABASE_URL
        value: https://fjsogozwseqoxgddjeig.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: PLATFORM_URL
        sync: false

  # Синхронизация присутствия ответственных через пользовательский аккаунт
  # Telegram (MTProto, вход по номеру телефона). Обновляет chat_employee_presence
  # достоверным списком участников групп — чинит ложные «нет ответственного».
  # Запускать ПЕРЕД дневной сводкой. TELEGRAM_SESSION получить локально через
  # `npm run telegram-login` и вставить сюда как секрет.
  - type: cron
    name: ob-chat-checklist-telegram-sync
    runtime: node
    plan: free
    autoDeploy: true
    # 07:30 Asia/Yerevan (03:30 UTC) — до дневной сводки в 08:00.
    schedule: "30 3 * * *"
    buildCommand: npm install
    startCommand: npm run telegram-sync
    envVars:
      - key: SUPABASE_URL
        value: https://fjsogozwseqoxgddjeig.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_SESSION
        sync: false
