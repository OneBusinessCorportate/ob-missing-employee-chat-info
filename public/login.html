<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>Вход · Проблемные чаты</title>
    <style>
      :root {
        --bg: #f5f6f8; --card: #ffffff; --text: #1a1d21; --muted: #6b7280;
        --border: #e5e7eb; --accent: #2563eb; --danger: #b91c1c;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f1115; --card: #181b20; --text: #e7e9ec; --muted: #9aa0aa;
          --border: #2a2e35; --accent: #60a5fa; --danger: #f87171;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: flex; align-items: center;
        justify-content: center; padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg); color: var(--text);
      }
      .card {
        background: var(--card); border: 1px solid var(--border);
        border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 360px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      }
      h1 { font-size: 1.2rem; margin: 0 0 6px; }
      p.hint { margin: 0 0 20px; color: var(--muted); font-size: 0.85rem; }
      label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
      input[type="password"] {
        width: 100%; padding: 12px 14px; font-size: 1rem;
        border: 1px solid var(--border); border-radius: 10px;
        background: var(--bg); color: var(--text);
      }
      input:focus-visible, button:focus-visible {
        outline: 2px solid var(--accent); outline-offset: 2px;
      }
      button {
        margin-top: 16px; width: 100%; padding: 12px; font-size: 1rem;
        font-weight: 600; color: #fff; background: var(--accent);
        border: none; border-radius: 10px; cursor: pointer;
      }
      .error {
        display: none; margin: 0 0 14px; padding: 10px 12px; border-radius: 10px;
        background: rgba(185,28,28,0.12); color: var(--danger); font-size: 0.85rem;
      }
      .error.show { display: block; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Проблемные чаты</h1>
      <p class="hint">Системный чек-лист. Введите пароль доступа.</p>
      <p class="error" id="error" role="alert">Неверный пароль. Попробуйте ещё раз.</p>
      <form method="POST" action="/login" autocomplete="on">
        <label for="password">Пароль</label>
        <input id="password" name="password" type="password" required autofocus
               autocomplete="current-password" aria-label="Пароль доступа" />
        <button type="submit">Войти</button>
      </form>
    </main>
    <script>
      // Показать сообщение об ошибке, если сервер вернул ?error=1.
      if (new URLSearchParams(location.search).has("error")) {
        document.getElementById("error").classList.add("show");
      }
    </script>
  </body>
</html>
