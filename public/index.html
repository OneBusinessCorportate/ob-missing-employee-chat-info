<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>Проблемные чаты · Ответственные</title>
    <style>
      :root {
        --bg: #f5f6f8;
        --card: #ffffff;
        --text: #1a1d21;
        --muted: #6b7280;
        --border: #e5e7eb;
        --accent: #2563eb;
        --accent-weak: rgba(37, 99, 235, 0.1);
        --danger-bg: #fee2e2;
        --danger-text: #b91c1c;
        --ok: #059669;
        --skeleton: #e9ebef;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f1115;
          --card: #181b20;
          --text: #e7e9ec;
          --muted: #9aa0aa;
          --border: #2a2e35;
          --accent: #60a5fa;
          --accent-weak: rgba(96, 165, 250, 0.16);
          --danger-bg: #3a1d1d;
          --danger-text: #f87171;
          --ok: #34d399;
          --skeleton: #23272e;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.45;
      }
      .wrap { max-width: 1000px; margin: 0 auto; padding: 16px; }
      .topbar { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
      header h1 { font-size: 1.25rem; margin: 4px 0 2px; }
      header p { margin: 0 0 4px; color: var(--muted); font-size: 0.9rem; }
      .meta { color: var(--muted); font-size: 0.75rem; margin: 0 0 12px; }
      .btn {
        border: 1px solid var(--border); background: var(--card); color: var(--text);
        border-radius: 10px; padding: 8px 12px; font-size: 0.8rem; cursor: pointer;
        white-space: nowrap;
      }
      .btn:hover { border-color: var(--accent); }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 16px;
      }
      .stat {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.12s, background 0.12s;
        font: inherit;
        color: inherit;
      }
      .stat:hover { border-color: var(--accent); }
      .stat[aria-pressed="true"] { border-color: var(--accent); background: var(--accent-weak); }
      .stat[data-filter="total"] { cursor: default; }
      .stat[data-filter="total"]:hover { border-color: var(--border); }
      .stat .num { font-size: 1.5rem; font-weight: 700; }
      .stat .lbl { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
        align-items: center;
      }
      #search {
        flex: 1 1 200px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--card);
        color: var(--text);
        font-size: 0.95rem;
      }
      #sort {
        padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px;
        background: var(--card); color: var(--text); font-size: 0.9rem;
      }
      :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

      .list { display: flex; flex-direction: column; gap: 10px; }
      .row {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 14px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }
      .row .name { font-weight: 600; font-size: 1rem; word-break: break-word; }
      .row .sub { color: var(--muted); font-size: 0.78rem; margin-top: 2px; }
      .tags { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
      .tag {
        background: var(--danger-bg);
        color: var(--danger-text);
        border-radius: 6px;
        padding: 3px 8px;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .actions { flex: 0 0 auto; display: flex; flex-direction: column; gap: 6px; align-items: stretch; }
      .link, .copy {
        text-decoration: none;
        color: var(--accent);
        border: 1px solid var(--accent);
        border-radius: 8px;
        padding: 7px 12px;
        font-size: 0.8rem;
        white-space: nowrap;
        text-align: center;
        background: transparent;
        cursor: pointer;
      }
      .link.disabled { color: var(--muted); border-color: var(--border); pointer-events: none; }
      .copy:disabled { color: var(--muted); border-color: var(--border); cursor: not-allowed; }

      .empty, .loading { text-align: center; color: var(--muted); padding: 40px 0; }
      .error { color: var(--danger-text); text-align: center; padding: 20px 0; }
      footer { text-align: center; color: var(--muted); font-size: 0.75rem; margin-top: 20px; }

      /* Скелетоны загрузки */
      .skeleton { pointer-events: none; }
      .sk-bar { background: var(--skeleton); border-radius: 6px; height: 12px; animation: pulse 1.2s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
      @media (prefers-reduced-motion: reduce) { .sk-bar { animation: none; } }

      /* Тост */
      #toast {
        position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%) translateY(20px);
        background: var(--text); color: var(--bg); padding: 10px 16px; border-radius: 10px;
        font-size: 0.85rem; opacity: 0; transition: opacity 0.2s, transform 0.2s;
        pointer-events: none; z-index: 10;
      }
      #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }

      @media (max-width: 560px) {
        .stats { grid-template-columns: repeat(2, 1fr); }
        .row { flex-direction: column; }
        .actions { flex-direction: row; flex-wrap: wrap; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <header>
          <h1>Проблемные чаты</h1>
          <p>Системный чек-лист: чаты без ответственных. Не отчёт о нарушениях.</p>
          <p class="meta" id="meta"></p>
        </header>
        <div style="display:flex; gap:8px;">
          <button class="btn" id="refresh" type="button" aria-label="Обновить данные">↻ Обновить</button>
          <button class="btn" id="csv" type="button" aria-label="Экспорт в CSV">CSV</button>
          <button class="btn" id="logout" type="button" hidden>Выйти</button>
        </div>
      </div>

      <section class="stats" id="stats" aria-label="Сводка">
        <button class="stat" data-filter="total" type="button" aria-disabled="true">
          <div class="num" id="s-total">–</div><div class="lbl">С неполной инф.</div>
        </button>
        <button class="stat" data-filter="accountant" type="button" aria-pressed="false">
          <div class="num" id="s-acc">–</div><div class="lbl">Без бухгалтера</div>
        </button>
        <button class="stat" data-filter="head_accountant" type="button" aria-pressed="false">
          <div class="num" id="s-head">–</div><div class="lbl">Без гл. бухгалтера</div>
        </button>
        <button class="stat" data-filter="manager" type="button" aria-pressed="false">
          <div class="num" id="s-mgr">–</div><div class="lbl">Без менеджера</div>
        </button>
      </section>

      <section class="controls">
        <input id="search" type="search" placeholder="Поиск по названию или Chat ID…"
               autocomplete="off" aria-label="Поиск по чатам" />
        <label class="sr-only" for="sort">Сортировка</label>
        <select id="sort" aria-label="Сортировка">
          <option value="missing">Сначала с бо́льшим числом пропусков</option>
          <option value="name">По названию (А→Я)</option>
          <option value="updated">Сначала недавно проверенные</option>
        </select>
        <button class="chip" id="chip-notchecked" type="button" aria-pressed="false" hidden>Не проверено</button>
      </section>

      <section id="list" class="list" aria-live="polite" aria-busy="true"></section>
      <div id="msg" class="loading">Загрузка…</div>

      <footer id="footer"></footer>
    </div>
    <div id="toast" role="status" aria-live="polite"></div>

    <script>
      const state = { all: [], notChecked: [], counts: null, filters: new Set(), search: "", sort: "missing", showNotChecked: false };

      const el = (id) => document.getElementById(id);

      function toast(text) {
        const t = el("toast");
        t.textContent = text;
        t.classList.add("show");
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove("show"), 2200);
      }

      function fmtDate(iso) {
        if (!iso) return "—";
        try {
          return new Date(iso).toLocaleString("ru-RU", {
            day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit",
          });
        } catch { return iso; }
      }

      function missingTags(c) {
        if (c.no_data) return ["Нет данных — бот не проверял чат"];
        const tags = [];
        if (c.missing_accountant) tags.push("Нет бухгалтера");
        if (c.missing_head_accountant) tags.push("Нет гл. бухгалтера");
        if (c.missing_manager) tags.push("Нет менеджера");
        return tags;
      }

      // Подпись под названием: Chat ID (как в отчёте).
      function subtitle(c) {
        return c.chat_id ? "Chat ID: " + c.chat_id : "";
      }

      function showSkeletons() {
        const list = el("list");
        list.setAttribute("aria-busy", "true");
        list.innerHTML = "";
        el("msg").textContent = "";
        for (let i = 0; i < 4; i++) {
          const row = document.createElement("div");
          row.className = "row skeleton";
          row.innerHTML =
            '<div style="flex:1"><div class="sk-bar" style="width:55%;height:16px"></div>' +
            '<div class="sk-bar" style="width:35%;margin-top:8px"></div>' +
            '<div class="sk-bar" style="width:70%;margin-top:10px"></div></div>' +
            '<div class="sk-bar" style="width:90px;height:32px"></div>';
          list.appendChild(row);
        }
      }

      function currentFiltered() {
        const q = state.search.trim().toLowerCase();
        // Источник: либо непроверенные чаты, либо проблемные (по умолчанию).
        const source = state.showNotChecked ? state.notChecked : state.all;
        let filtered = source.filter((c) => {
          if (q) {
            const hay = [c.chat_name, c.chat_id].filter(Boolean).join(" ").toLowerCase();
            if (!hay.includes(q)) return false;
          }
          // Фильтры по ролям применяются только к проблемным чатам.
          if (!state.showNotChecked) {
            for (const f of state.filters) {
              if (f === "accountant" && !c.missing_accountant) return false;
              if (f === "head_accountant" && !c.missing_head_accountant) return false;
              if (f === "manager" && !c.missing_manager) return false;
            }
          }
          return true;
        });

        const collator = new Intl.Collator("ru");
        if (state.showNotChecked || state.sort === "name") {
          // У непроверенных нет числа пропусков — сортируем по названию.
          filtered.sort((a, b) => collator.compare(a.chat_name, b.chat_name));
        } else if (state.sort === "updated") {
          filtered.sort((a, b) => (b.checked_at || "").localeCompare(a.checked_at || ""));
        } else {
          // По числу пропусков (убыв.), затем по названию.
          filtered.sort((a, b) => b.missing_count - a.missing_count || collator.compare(a.chat_name, b.chat_name));
        }
        return filtered;
      }

      function render() {
        const filtered = currentFiltered();
        const list = el("list");
        const msg = el("msg");
        list.setAttribute("aria-busy", "false");
        list.innerHTML = "";

        if (filtered.length === 0) {
          const c = state.counts;
          if (state.showNotChecked) {
            msg.textContent = state.notChecked.length === 0
              ? "Непроверенных чатов нет — все чаты с данными."
              : "Ничего не найдено по заданным условиям.";
          } else if (c && c.total_chats === 0) {
            msg.textContent = c.excluded_test
              ? `Чатов для проверки нет — скрыто тестовых: ${c.excluded_test}.`
              : "Чатов для проверки пока нет.";
          } else if (state.all.length === 0) {
            msg.textContent = "Все проверенные чаты укомплектованы 🎉";
          } else {
            msg.textContent = "Ничего не найдено по заданным условиям.";
          }
          msg.className = "empty";
          return;
        }
        msg.textContent = "";

        for (const c of filtered) {
          const row = document.createElement("article");
          row.className = "row";

          const left = document.createElement("div");
          const name = document.createElement("div");
          name.className = "name";
          name.textContent = c.chat_name;
          left.appendChild(name);

          const subText = subtitle(c);
          if (subText) {
            const sub = document.createElement("div");
            sub.className = "sub";
            sub.textContent = subText;
            left.appendChild(sub);
          }

          const tags = document.createElement("div");
          tags.className = "tags";
          for (const t of missingTags(c)) {
            const tagEl = document.createElement("span");
            tagEl.className = "tag";
            tagEl.textContent = t;
            tags.appendChild(tagEl);
          }
          left.appendChild(tags);

          const actions = document.createElement("div");
          actions.className = "actions";

          const copy = document.createElement("button");
          copy.type = "button";
          copy.className = "copy";
          copy.textContent = "Копировать ID";
          if (!c.chat_id) copy.disabled = true;
          copy.setAttribute("aria-label", "Копировать Chat ID чата " + c.chat_name);
          copy.addEventListener("click", () => copyText(c.chat_id, "Chat ID скопирован"));
          actions.appendChild(copy);

          row.appendChild(left);
          row.appendChild(actions);
          list.appendChild(row);
        }
      }

      async function copyText(text, okMsg) {
        if (!text) return;
        try {
          await navigator.clipboard.writeText(String(text));
          toast(okMsg);
        } catch {
          // Резервный способ, если clipboard API недоступен (напр. без HTTPS).
          const ta = document.createElement("textarea");
          ta.value = String(text); document.body.appendChild(ta); ta.select();
          try { document.execCommand("copy"); toast(okMsg); }
          catch { toast("Не удалось скопировать"); }
          ta.remove();
        }
      }

      function toCsv() {
        const rows = currentFiltered();
        if (rows.length === 0) { toast("Нет данных для экспорта"); return; }
        const header = ["Чат", "Chat ID", "Нет бухгалтера", "Нет гл. бухгалтера", "Нет менеджера", "Проверено"];
        const esc = (v) => '"' + String(v ?? "").replace(/"/g, '""') + '"';
        const yn = (b) => (b ? "да" : "");
        const lines = [header.map(esc).join(",")];
        for (const c of rows) {
          lines.push([
            c.chat_name, c.chat_id,
            yn(c.missing_accountant), yn(c.missing_head_accountant), yn(c.missing_manager),
            c.checked_at,
          ].map(esc).join(","));
        }
        // BOM, чтобы Excel корректно открыл кириллицу в UTF-8.
        const blob = new Blob(["﻿" + lines.join("\r\n")], { type: "text/csv;charset=utf-8" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "problem-chats.csv";
        a.click();
        URL.revokeObjectURL(a.href);
        toast("Экспортировано: " + rows.length);
      }

      async function load() {
        showSkeletons();
        try {
          const res = await fetch("/api/problem-chats", { headers: { Accept: "application/json" } });
          if (res.status === 401) { location.href = "/login"; return; }
          const data = await res.json();
          if (!data.ok) throw new Error(data.error || "Ошибка загрузки");
          state.all = data.chats;
          state.notChecked = data.not_checked || [];
          state.counts = data.counts;
          el("s-total").textContent = data.counts.total_problems;
          el("s-acc").textContent = data.counts.missing_accountant;
          el("s-head").textContent = data.counts.missing_head_accountant;
          el("s-mgr").textContent = data.counts.missing_manager;
          // Чип «Не проверено» показываем только если такие чаты есть.
          const nc = data.counts.not_checked || 0;
          const chip = el("chip-notchecked");
          chip.hidden = nc === 0;
          chip.textContent = "Не проверено: " + nc;
          let footer = "Всего чатов проверено: " + data.counts.total_chats;
          if (nc) footer += " · не проверено (нет данных): " + nc;
          if (data.counts.excluded_test) footer += " · тестовых скрыто: " + data.counts.excluded_test;
          el("footer").textContent = footer;
          el("meta").textContent =
            "Данные актуальны на " + fmtDate(data.counts.data_updated_at) +
            " · загружено " + fmtDate(data.generated_at);
          el("logout").hidden = false;
          render();
        } catch (err) {
          el("list").innerHTML = "";
          el("list").setAttribute("aria-busy", "false");
          const msg = el("msg");
          msg.textContent = "Ошибка: " + err.message;
          msg.className = "error";
        }
      }

      // --- Обработчики ---
      el("search").addEventListener("input", (e) => { state.search = e.target.value; render(); });
      el("sort").addEventListener("change", (e) => { state.sort = e.target.value; render(); });
      el("refresh").addEventListener("click", load);
      el("csv").addEventListener("click", toCsv);
      el("logout").addEventListener("click", async () => {
        await fetch("/logout", { method: "POST" });
        location.href = "/login";
      });

      // Плитки-фильтры (кроме «всего»). Работают мышью и с клавиатуры (это <button>).
      document.querySelectorAll('.stat[aria-pressed]').forEach((tile) => {
        tile.addEventListener("click", () => {
          // Клик по роли всегда возвращает к списку проблемных чатов.
          if (state.showNotChecked) toggleNotChecked(false);
          const f = tile.dataset.filter;
          if (state.filters.has(f)) { state.filters.delete(f); tile.setAttribute("aria-pressed", "false"); }
          else { state.filters.add(f); tile.setAttribute("aria-pressed", "true"); }
          render();
        });
      });

      // Переключатель «Не проверено» — показывает чаты без данных (бот их не проверял).
      function toggleNotChecked(on) {
        state.showNotChecked = on;
        el("chip-notchecked").setAttribute("aria-pressed", String(on));
        el("chip-notchecked").classList.toggle("active", on);
      }
      el("chip-notchecked").addEventListener("click", () => {
        toggleNotChecked(!state.showNotChecked);
        render();
      });

      load();
    </script>
  </body>
</html>
