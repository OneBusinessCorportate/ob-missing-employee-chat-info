<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>Разбор тикетов за вчера</title>
    <style>
      :root {
        --bg: #f5f6f8; --card: #ffffff; --text: #1a1d21; --muted: #6b7280;
        --border: #e5e7eb; --accent: #2563eb; --danger: #b91c1c; --ok: #15803d;
        --crit: #dc2626; --med: #ea580c; --light: #16a34a;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f1115; --card: #181b20; --text: #e7e9ec; --muted: #9aa0aa;
          --border: #2a2e35; --accent: #60a5fa; --danger: #f87171; --ok: #4ade80;
          --crit: #f87171; --med: #fb923c; --light: #4ade80;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; padding: 16px; padding-bottom: 40px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg); color: var(--text); line-height: 1.4;
      }
      .wrap { max-width: 720px; margin: 0 auto; }
      header.top { margin-bottom: 16px; }
      h1 { font-size: 1.25rem; margin: 0 0 8px; }
      .banner {
        background: rgba(37,99,235,0.10); border: 1px solid var(--border);
        border-radius: 12px; padding: 12px 14px; color: var(--text); font-size: 0.95rem;
      }
      .progress { margin: 12px 0; font-weight: 600; }
      .bar { height: 8px; background: var(--border); border-radius: 6px; overflow: hidden; margin-top: 6px; }
      .bar > span { display: block; height: 100%; background: var(--accent); width: 0%; transition: width .3s; }
      .logout { float: right; font-size: 0.8rem; }
      .logout button {
        background: none; border: 1px solid var(--border); color: var(--muted);
        border-radius: 8px; padding: 6px 10px; cursor: pointer;
      }
      .ticket {
        background: var(--card); border: 1px solid var(--border); border-radius: 14px;
        padding: 14px 16px; margin-bottom: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      }
      .ticket h2 { font-size: 1rem; margin: 0 0 4px; }
      .meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; }
      .meta .sev { font-weight: 700; }
      .sev.critical { color: var(--crit); }
      .sev.medium { color: var(--med); }
      .sev.light { color: var(--light); }
      .desc { font-size: 0.92rem; margin: 6px 0 10px; white-space: pre-wrap; }
      .row { display: flex; gap: 10px; flex-wrap: wrap; }
      button.act {
        flex: 1 1 140px; padding: 12px; font-size: 0.95rem; font-weight: 600;
        border: none; border-radius: 10px; cursor: pointer; color: #fff;
      }
      button.accept { background: var(--ok); }
      button.appeal { background: var(--danger); }
      button:disabled { opacity: .5; cursor: default; }
      textarea {
        width: 100%; margin-top: 10px; padding: 10px 12px; font-size: 0.95rem;
        border: 1px solid var(--border); border-radius: 10px; background: var(--bg);
        color: var(--text); resize: vertical; min-height: 70px; display: none;
      }
      textarea.show { display: block; }
      .err { color: var(--danger); font-size: 0.82rem; margin-top: 6px; display: none; }
      .err.show { display: block; }
      .done {
        text-align: center; padding: 40px 20px; font-size: 1.1rem; color: var(--ok); font-weight: 600;
      }
      .loading { text-align: center; color: var(--muted); padding: 40px 0; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="top">
        <span class="logout">
          <form method="POST" action="/logout" style="margin:0"><button type="submit">Выйти</button></form>
        </span>
        <h1>Разбор тикетов за вчера</h1>
        <div class="banner">
          Перед началом работы необходимо обработать все тикеты за вчерашний день.
        </div>
        <div class="progress" id="progress">Загрузка…<div class="bar"><span id="barfill"></span></div></div>
      </header>
      <main id="list"><div class="loading">Загрузка тикетов…</div></main>
    </div>

    <script>
      const $ = (s, r = document) => r.querySelector(s);
      const listEl = $("#list");
      const progressEl = $("#progress");
      const barEl = $("#barfill");

      // Экранирование для безопасной вставки текста тикета в HTML.
      function esc(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      const SEV_LABEL = { critical: "Критическая", medium: "Средняя", light: "Лёгкая" };

      function setProgress(total, answered) {
        const pct = total ? Math.round((answered / total) * 100) : 100;
        progressEl.firstChild.textContent = `Обработано ${answered} из ${total} тикетов`;
        barEl.style.width = pct + "%";
      }

      function ticketCard(t) {
        const el = document.createElement("section");
        el.className = "ticket";
        el.dataset.id = t.problem_id;
        const parts = [];
        parts.push(`<h2>${esc(t.chat_name || t.chat_code || "Тикет")}</h2>`);
        const meta = [];
        if (t.chat_code) meta.push(`Chat ID: ${esc(t.chat_code)}`);
        meta.push(`<span class="sev ${t.severity}">${SEV_LABEL[t.severity] || "Средняя"}</span>`);
        if (t.accountant_name) meta.push(`Ответственный: ${esc(t.accountant_name)}`);
        if (t.detected_at) meta.push(new Date(t.detected_at).toLocaleString("ru-RU"));
        if (t.status) meta.push(`Статус: ${esc(t.status)}`);
        parts.push(`<div class="meta">${meta.join(" · ")}</div>`);
        const body = t.problem_description || t.problem_title || "";
        if (body) parts.push(`<div class="desc">${esc(body)}</div>`);
        if (t.ai_comment) parts.push(`<div class="desc"><em>${esc(t.ai_comment)}</em></div>`);
        parts.push(`
          <div class="row">
            <button class="act accept" type="button">Принять</button>
            <button class="act appeal" type="button">Подать апелляцию</button>
          </div>
          <textarea placeholder="Комментарий: объясните, почему вы не согласны с тикетом" maxlength="2000"></textarea>
          <div class="err"></div>`);
        el.innerHTML = parts.join("");

        const acceptBtn = $(".accept", el);
        const appealBtn = $(".appeal", el);
        const ta = $("textarea", el);
        const errEl = $(".err", el);

        acceptBtn.addEventListener("click", () => submit(el, "accept"));
        appealBtn.addEventListener("click", () => {
          if (!ta.classList.contains("show")) {
            ta.classList.add("show");
            ta.focus();
            errEl.classList.remove("show");
            return;
          }
          submit(el, "appeal");
        });
        return el;
      }

      async function submit(el, action) {
        const id = el.dataset.id;
        const ta = $("textarea", el);
        const errEl = $(".err", el);
        const buttons = el.querySelectorAll("button");
        const comment = ta.value.trim();
        if (action === "appeal" && !comment) {
          errEl.textContent = "Введите комментарий для апелляции.";
          errEl.classList.add("show");
          return;
        }
        buttons.forEach((b) => (b.disabled = true));
        errEl.classList.remove("show");
        try {
          const res = await fetch(`/api/review/${action}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ problem_id: id, comment }),
          });
          const data = await res.json();
          if (!res.ok || !data.ok) {
            errEl.textContent = data.error || "Не удалось сохранить ответ.";
            errEl.classList.add("show");
            buttons.forEach((b) => (b.disabled = false));
            return;
          }
          el.remove();
          setProgress(data.total, data.answered);
          if (data.done) finish();
        } catch (e) {
          errEl.textContent = "Ошибка сети. Попробуйте ещё раз.";
          errEl.classList.add("show");
          buttons.forEach((b) => (b.disabled = false));
        }
      }

      function finish() {
        listEl.innerHTML = '<div class="done">✅ Все тикеты обработаны. Открываем платформу…</div>';
        setTimeout(() => (location.href = "/"), 900);
      }

      async function load() {
        try {
          const res = await fetch("/api/review/tickets", { headers: { "Cache-Control": "no-store" } });
          const data = await res.json();
          if (!data.ok) throw new Error(data.error || "load failed");
          if (!data.applicable || data.done || !data.tickets.length) {
            setProgress(data.total || 0, data.answered || 0);
            return finish();
          }
          setProgress(data.total, data.answered);
          listEl.innerHTML = "";
          data.tickets.forEach((t) => listEl.appendChild(ticketCard(t)));
        } catch (e) {
          listEl.innerHTML = '<div class="loading">Не удалось загрузить тикеты. Обновите страницу.</div>';
        }
      }

      load();
    </script>
  </body>
</html>
